<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Blog Admin</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }

    .container { max-width:900px; margin:auto; }

    form, .blog-card {
      background:#fff;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
    }

    input, textarea, select {
      width:100%;
      margin:5px 0;
      padding:10px;
    }

    button {
      padding:10px;
      margin-top:10px;
      cursor:pointer;
    }

    .actions {
      display:flex;
      gap:10px;
      margin-top:10px;
    }

    .edit { background:#f59e0b; color:#fff; }
    .delete { background:#ef4444; color:#fff; }
    .save { background:#16a34a; color:#fff; }
  </style>
</head>

<body>
<div class="container">

  <h2>Blog Admin Panel</h2>

  <!-- FORM -->
  <form id="blogForm">
    <input type="hidden" name="ID" id="blogId">

    <input type="text" name="Title" id="title" placeholder="Title" required>
    <textarea name="Content" id="content" placeholder="Content" required></textarea>
    <input type="date" name="Date" id="date" required>
    <input type="text" name="Name" id="name" placeholder="Author" required>
    <input type="text" name="Image" id="image" placeholder="Image URL">
    
    <select name="Status" id="status">
      <option value="published">Published</option>
      <option value="draft">Draft</option>
    </select>

    <button type="submit" id="submitBtn">Save Blog</button>
  </form>

  <h3>All Blogs</h3>
  <div id="blogList"></div>

</div>

<script>
const API = "https://sheetdb.io/api/v1/elufdc7107qdy";

const form = document.getElementById("blogForm");
const list = document.getElementById("blogList");
const btn = document.getElementById("submitBtn");

let editingId = null;

// LOAD BLOGS
async function loadBlogs() {
  const res = await fetch(API);
  const data = await res.json();

  list.innerHTML = data.map(blog => `
    <div class="blog-card">
      <h3>${blog.Title}</h3>
      <p>${blog.Content.substring(0,120)}...</p>
      <small>${blog.Date} - ${blog.Name}</small>

      <div class="actions">
        <button class="edit" onclick='editBlog(${JSON.stringify(blog)})'>Edit</button>
        <button class="delete" onclick="deleteBlog('${blog.ID}')">Delete</button>
      </div>
    </div>
  `).join("");
}

// CREATE OR UPDATE
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    data: [{
      ID: editingId || "blog-" + Date.now(),
      Title: title.value,
      Content: content.value,
      Date: date.value,
      Name: name.value,
      Image: image.value,
      Status: status.value
    }]
  };

  if (editingId) {
    // UPDATE
    await fetch(`${API}/ID/${editingId}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    editingId = null;
    btn.textContent = "Save Blog";
  } else {
    // CREATE
    await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
  }

  form.reset();
  loadBlogs();
});

// EDIT
function editBlog(blog) {
  editingId = blog.ID;

  blogId.value = blog.ID;
  title.value = blog.Title;
  content.value = blog.Content;
  date.value = blog.Date;
  name.value = blog.Name;
  image.value = blog.Image;
  status.value = blog.Status;

  btn.textContent = "Update Blog";
}

// DELETE
async function deleteBlog(id) {
  if (!confirm("Delete this blog?")) return;

  await fetch(`${API}/ID/${id}`, {
    method: "DELETE"
  });

  loadBlogs();
}

// INIT
loadBlogs();
</script>

</body>
</html>
