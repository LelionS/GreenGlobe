<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate - Paystack</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .donate-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #00c853, #64dd17);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            transition: 0.3s ease;
        }

        .donate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        .modal-content {
            background: #ffffff;
            padding: 25px 20px;
            width: 340px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            transform: translateY(20px);
            animation: slideUp 0.3s ease forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .modal-header h3 {
            margin: 0;
            font-weight: 600;
        }

        .modal-header p {
            font-size: 13px;
            color: #777;
        }

        .input-group {
            margin-top: 12px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #00c853;
            box-shadow: 0 0 0 2px rgba(0,200,83,0.1);
        }

        .pay-btn {
            margin-top: 18px;
            padding: 12px;
            background: linear-gradient(135deg, #00c853, #00e676);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .pay-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .cancel-btn {
            margin-top: 10px;
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 13px;
        }

        .cancel-btn:hover {
            color: #333;
        }
    </style>
</head>
<body>

<button class="donate-btn" onclick="openModal()">Donate</button>

<div class="modal" id="donationModal">
    <div class="modal-content">
        
        <div class="modal-header" style="text-align:center; padding-bottom:15px; border-bottom:1px solid #ddd;">
            <h3 style="margin:0; font-size:1.5em; color:#4CAF50;">Support Our Cause</h3>
            <p style="margin:5px 0 0 0; font-size:0.95em; color:#555;">
                Every donation helps us make a real impact on the environment.
            </p>
        </div>

        <div class="input-group">
            <input type="text" id="name" placeholder="Full Name">
        </div>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address">
        </div>

        <div class="input-group">
            <input type="number" id="amount" placeholder="Amount (KES)">
        </div>

        <button class="pay-btn" onclick="payWithPaystack()">Proceed to Pay</button>
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
function openModal() {
    document.getElementById('donationModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('donationModal').style.display = 'none';
}

function payWithPaystack() {
    let name = document.getElementById('name').value;
    let email = document.getElementById('email').value;
    let amount = document.getElementById('amount').value * 100;

    if (!name || !email || !amount) {
        alert("Please fill all fields");
        return;
    }

    let handler = PaystackPop.setup({
        key: 'pk_test_d7951d7e38ba53250f4b90ea3a68a5df0e5607b6',
        email: email,
        amount: amount,
        currency: 'KES',
        metadata: {
            custom_fields: [
                {
                    display_name: "Full Name",
                    variable_name: "full_name",
                    value: name
                }
            ]
        },
        callback: function(response) {
            alert('Payment successful! Ref: ' + response.reference);
            closeModal();
        },
        onClose: function() {
            alert('Transaction cancelled');
        }
    });

    handler.openIframe();
}
</script>

</body>
</html>
